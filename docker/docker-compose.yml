version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: verifyme-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - verifyme-network

  billing-postgres:
    image: postgres:15-alpine
    container_name: billing-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=billing_db
    volumes:
      - billing-postgres-data:/var/lib/postgresql/data
    networks:
      - verifyme-network

  billing-redis:
    image: redis:7-alpine
    container_name: billing-redis
    ports:
      - "6381:6379"
    networks:
      - verifyme-network

  gov-redis:
    image: redis:7-alpine
    container_name: gov-redis
    ports:
      - "6382:6379"
    networks:
      - verifyme-network

  gateway-redis:
    image: redis:7-alpine
    container_name: gateway-redis
    ports:
      - "6380:6379"
    networks:
      - verifyme-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: verifyme-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - verifyme-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: verifyme-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    networks:
      - verifyme-network

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: verifyme-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - verifyme-network

  billing-service:
    build: ../app/billing-service
    container_name: billing-service
    ports:
      - "3002:3002"
      - "50051:50051"
    environment:
      - PORT=3002
      - BILLING_POSTGRES_URI=postgres://postgres:postgres@billing-postgres:5432/billing_db
      - BILLING_REDIS_URL=redis://billing-redis:6379
      - BILLING_GRPC_BIND_ADDRESS=0.0.0.0:50051
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - billing-postgres
      - billing-redis
      - jaeger
    networks:
      - verifyme-network

  gov-provider:
    build: ../app/gov-provider
    container_name: gov-provider
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URI=${MONGO_URI_GOV}
      - REDIS_URL=redis://gov-redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - BILLING_GRPC_ADDR=billing-service:50051
      - BILLING_GRPC_DEADLINE_MS=4000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - mongo
      - gov-redis
      - rabbitmq
      - billing-service
    networks:
      - verifyme-network

  verification-gateway:
    build: ../app/verification-gateway
    container_name: verification-gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=${MONGO_URI_GATEWAY}
      - GOV_PROVIDER_URL=${GOV_PROVIDER_URL}
      - GOV_CLIENT_ID=${GOV_CLIENT_ID}
      - GOV_CLIENT_SECRET=${GOV_CLIENT_SECRET}
      - REDIS_URL_GATEWAY=redis://gateway-redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - GATEWAY_BASE_URL=http://verification-gateway:3000
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - BILLING_GRPC_ADDR=billing-service:50051
      - BILLING_GRPC_DEADLINE_MS=4000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - mongo
      - gov-provider
      - gateway-redis
      - rabbitmq
      - elasticsearch
      - jaeger
      - billing-service
    networks:
      - verifyme-network

networks:
  verifyme-network:
    driver: bridge

volumes:
  mongo-data:
  billing-postgres-data:
